name: Refresh analytics snapshot

# Collects a small panel of real open-source repositories daily and commits the
# merged DuckDB snapshot back to this branch so the Streamlit Cloud demo can
# read real, current data. The snapshot path is allow-listed in .gitignore.
#
# API cost note: a GITHUB_TOKEN with default permissions is enough for public
# repos; a PAT raises the rate ceiling. PR reviews are only fetched for PRs
# created in the trailing window (see pipeline.PR_REVIEW_WINDOW_DAYS), so each
# run's cost is bounded and does not scale with total repo history.

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: Comma-separated owner/name list (overrides default panel)
        required: false
        default: ""
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .

      - name: Refresh panel repositories into one snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.REPOPULSE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          REPOSITORIES: ${{ inputs.repositories }}
        run: |
          mkdir -p data/snapshot
          DB="data/snapshot/repopulse.duckdb"
          # Default demo panel: a few comparable data-engineering projects.
          if [ -z "$REPOSITORIES" ]; then
            REPOS="duckdb/duckdb,pola-rs/polars,tobymao/sqlglot"
          else
            REPOS="$REPOSITORIES"
          fi
          IFS=',' read -ra LIST <<< "$REPOS"
          for repo in "${LIST[@]}"; do
            echo "Collecting $repo ..."
            repopulse --db "$DB" collect "$repo" --max-pages 8 || echo "  $repo failed, continuing"
          done
      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot/repopulse.duckdb || true
          if git diff --cached --quiet; then
            echo "No changes to snapshot."
          else
            git commit -m "chore: refresh analytics snapshot [skip ci]"
            git push
          fi
